# Bridge Server 负载均衡配置

# 基础 Nginx 配置
events {
    worker_connections 1024;
}

http {
    upstream bridge_servers {
        least_conn;  # 最少连接算法
        
        # 后端服务器（自动发现或手动配置）
        server bridge-server-1:19377 weight=1 max_fails=3 fail_timeout=30s;
        server bridge-server-2:19377 weight=1 max_fails=3 fail_timeout=30s;
        server bridge-server-3:19377 weight=1 max_fails=3 fail_timeout=30s;
        
        # 健康检查
        keepalive 32;
    }
    
    # HTTP 服务器（重定向到 HTTPS）
    server {
        listen 80;
        server_name _;
        
        # 强制 HTTPS 重定向
        return 301 https://$host$request_uri;
    }
    
    # HTTPS 服务器
    server {
        listen 443 ssl http2;
        server_name _;
        
        # SSL 证书
        ssl_certificate /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;
        
        # SSL 配置
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        
        # HSTS
        add_header Strict-Transport-Security "max-age=63072000" always;
        
        # 日志
        access_log /var/log/nginx/access.log;
        error_log /var/log/nginx/error.log;
        
        # 客户端真实 IP
        set_real_ip_from 0.0.0.0/0;
        real_ip_header X-Forwarded-For;
        real_ip_recursive on;
        
        # 代理配置
        location / {
            proxy_pass http://bridge_servers;
            proxy_http_version 1.1;
            
            # 请求头
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # 超时配置
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # 缓冲配置
            proxy_buffering off;
            proxy_request_buffering off;
        }
        
        # 健康检查端点
        location /health {
            proxy_pass http://bridge_servers/health;
            access_log off;
        }
        
        # 静态文件（可选）
        location /static {
            alias /usr/share/nginx/html/static;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }
}
