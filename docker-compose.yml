version: '3.8'

# Bridge Server v1.6.0 社区版 - Docker Compose 配置
# 包含：API 服务 + MySQL + Redis
# 使用方法: docker-compose up -d

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: bridge-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-bridge123}
      MYSQL_DATABASE: bridge_server
      MYSQL_USER: ${MYSQL_USER:-bridge}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-bridge123}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - bridge-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --innodb-buffer-pool-size=512M
      --innodb-log-file-size=128M
      --max-connections=200

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: bridge-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - bridge-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

  # Bridge Server API
  bridge-server:
    image: bridge-server:1.6.0
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: bridge-server
    ports:
      - "19377:19377"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - ENV=production
      - LOG_LEVEL=INFO
      # 数据库配置
      - DATABASE_URL=mysql+mysqlconnector://${MYSQL_USER:-bridge}:${MYSQL_PASSWORD:-bridge123}@mysql:3306/bridge_server
      # Redis 配置
      - REDIS_URL=redis://redis:6379
      # API Keys（从.env 文件加载）
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - MOONSHOT_API_KEY=${MOONSHOT_API_KEY:-}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY:-}
    volumes:
      - ./config.yaml:/root/.bridge-server/config.yaml:ro
      - bridge_logs:/app/logs
    networks:
      - bridge-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:19377/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # Nginx 反向代理（可选）
  nginx:
    image: nginx:alpine
    container_name: bridge-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/ssl/certs:/etc/nginx/ssl/certs:ro
      - ./docker/ssl/keys:/etc/nginx/ssl/keys:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - bridge-server
    networks:
      - bridge-network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

# 网络配置
networks:
  bridge-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# 数据卷
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  nginx_logs:
    driver: local
  bridge_logs:
    driver: local
